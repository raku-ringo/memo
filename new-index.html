<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>オープンチャット + Othello（本人確認機能付）</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root{
      --bg:#ffffff;
      --line:#e9e9e9;
      --text:#111111;
      --muted:#666666;
      --accent:#0b5fff;
      --black:#111111;
      --white:#ffffff;
      --radius:8px;
      font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN","Helvetica Neue",Arial,sans-serif;
    }

    html,body{height:100%;margin:0;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
    /* 投稿欄（上部固定） */
    .composer-fixed{
      position:fixed;left:0;right:0;top:0;background:linear-gradient(180deg, rgba(255,255,255,0.995), rgba(255,255,255,1));
      border-bottom:1px solid var(--line);padding:12px 0;z-index:1200;
      box-shadow:0 6px 18px rgba(0,0,0,0.04);
    }
    .composer-inner{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;gap:12px;align-items:flex-start}
    .composer-avatar{width:44px;height:44px;border-radius:8px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--text);flex-shrink:0}
    .composer-right{flex:1;display:flex;flex-direction:column;gap:8px}
    .row{display:flex;gap:8px;align-items:center}
    input[type="text"], textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--text);font-size:14px}
    textarea{min-height:64px;resize:vertical}
    .controls{display:flex;gap:8px;align-items:center}
    .btn{background:var(--accent);color:#fff;border:none;padding:9px 12px;border-radius:8px;font-weight:700;cursor:pointer}
    .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--muted);font-weight:600}

    /* 本文 */
    .page-wrap{max-width:1200px;margin:0 auto;padding:20px 16px 120px;box-sizing:border-box}
    .header{padding:12px 0 18px;border-bottom:1px solid var(--line);margin-bottom:12px}
    .brand{font-weight:700;font-size:18px}
    .subtitle{color:var(--muted);font-size:13px;margin-top:4px}

    /* レイアウト：縦分割 */
    .split { display: grid; grid-template-columns: 1fr 520px; gap: 12px; align-items:start; max-width:1200px; margin:0 auto; }
    @media(max-width:1100px){ .split { grid-template-columns: 1fr 1fr; } }

    /* チャット（新着は上に追加） */
    .chat-column{background:transparent;display:flex;flex-direction:column;gap:8px;min-height:320px}
    .message{display:flex;gap:12px;padding:12px;border:1px solid var(--line);border-radius:8px;align-items:flex-start;background:#fff}
    .avatar{width:44px;height:44px;border-radius:8px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;cursor:pointer}
    .body{flex:1}
    .meta{display:flex;gap:10px;align-items:center;margin-bottom:6px}
    .name{font-weight:700;font-size:13px;cursor:pointer}
    .time{color:var(--muted);font-size:12px}
    .text{white-space:pre-wrap;color:var(--text);line-height:1.7;font-size:15px}
    .reactions{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap}
    .reaction{border:1px solid var(--line);background:#fff;padding:6px 8px;border-radius:999px;color:var(--muted);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
    .reaction strong{color:var(--text);font-weight:700}

    /* 管理者バッジ */
    .admin-badge{display:inline-block;margin-left:8px;padding:4px 8px;border-radius:999px;background:#ffb400;color:#111;font-weight:700;font-size:12px}

    /* システムメッセージ */
    .system-note{background:#f5f7ff;border-left:4px solid #0b5fff}

    /* Othello */
    .othello-panel{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px;box-sizing:border-box}
    .rooms{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
    .room-item{padding:8px;border:1px solid var(--line);border-radius:8px;background:#fafafa;display:flex;justify-content:space-between;align-items:center}
    .board{display:grid;grid-template-columns:repeat(8,52px);grid-template-rows:repeat(8,52px);gap:6px;margin-top:8px}
    .cell{width:52px;height:52px;background:#2b7a2b;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;box-shadow:inset 0 -2px 0 rgba(0,0,0,0.06)}
    .cell.disabled{cursor:default;opacity:0.9}
    .disc{width:40px;height:40px;border-radius:50%;box-shadow:0 6px 14px rgba(0,0,0,0.18)}
    .black{background:var(--black)}
    .white{background:var(--white);border:1px solid #ccc}
    .last-move{outline:3px solid rgba(11,95,255,0.18);border-radius:8px}
    .legal-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.95);position:absolute}
    .turn-indicator{display:flex;gap:8px;align-items:center;margin-top:8px}
    .badge{padding:6px 10px;border-radius:999px;font-weight:700;color:#fff}
    .badge.black{background:var(--black)}
    .badge.white{background:var(--white);color:#111;border:1px solid #ccc}

    /* 結果アニメーション */
    .overlay{position:fixed;left:0;top:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:2000}
    .result-card{pointer-events:auto;min-width:280px;padding:28px 32px;border-radius:12px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.18);transform:translateY(-20px);opacity:0;animation:pop 700ms forwards}
    .result-card.win{background:linear-gradient(135deg,#0b5fff,#3fb0ff);color:#fff}
    .result-card.lose{background:linear-gradient(135deg,#444,#777);color:#fff}
    .result-title{font-size:28px;font-weight:900;margin-bottom:8px}
    .result-sub{font-size:16px;opacity:0.95}
    @keyframes pop { to { transform:translateY(0); opacity:1; } }

    @media (max-width:640px){
      .composer-inner{padding:0 12px}
      .row{flex-direction:column}
      .board{transform:scale(0.9);transform-origin:left top}
    }
  </style>
</head>
<body>
  <div class="composer-fixed" id="composerFixed">
    <div class="composer-inner">
      <div class="composer-avatar" id="composerAvatar">U</div>
      <div class="composer-right">
        <div class="row">
          <input id="username" type="text" placeholder="ユーザー名" style="max-width:260px" />
          <input id="seed" type="text" placeholder="seed（本人確認用）" />
          <button id="toggleOthello" class="btn">オセロ</button>
          <div style="margin-left:auto;display:flex;gap:8px">
            <button id="adminLoginBtn" class="btn ghost">管理者ログイン</button>
            <button id="adminModalBtn" class="btn" style="display:none">管理モーダル</button>
          </div>
        </div>
        <textarea id="messageInput" placeholder="コメントを入力..."></textarea>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="color:var(--muted);font-size:13px">シード値を入力すると、他人があなたになりすますのを防げます。</div>
          <div class="controls">
            <button class="btn ghost" id="clearBtn">全削除</button>
            <button class="btn" id="sendBtn">送信</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="mainWrap" class="page-wrap">
    <div class="header">
      <div class="brand">オープンチャット</div>
      <div class="subtitle">アイコンや名前をタップすると、そのユーザーの識別ID（なりすまし防止用）を確認できます。</div>
    </div>

    <div id="splitContainer">
      <div id="chatColumn" class="chat-column"></div>

      <aside id="othelloPanel" class="othello-panel" style="display:none">
        <div style="font-weight:700">オセロ</div>
        <div id="roomsControls" style="margin-top:8px">
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input id="roomInput" placeholder="部屋ID" style="flex:1;padding:8px;border:1px solid var(--line);border-radius:8px" />
            <button id="createRoomBtn" class="btn">作成</button>
            <button id="refreshRoomsBtn" class="btn ghost">更新</button>
          </div>
          <div class="rooms" id="roomsList"></div>
        </div>
        <div id="gameArea" style="display:none;margin-top:8px">
          <div style="display:flex;justify-content:space-between"><div id="currentRoomLabel"></div><div id="playersLabel"></div></div>
          <div class="turn-indicator"><div id="turnBadge" class="badge"></div></div>
          <div id="board" class="board"></div>
          <div style="display:flex;justify-content:space-between;margin-top:8px">
            <div id="statusLabel"></div>
            <div><button id="joinGameBtn" class="btn">参加</button><button id="leaveRoomBtn" class="btn ghost">退出</button></div>
          </div>
          <div id="countsLabel"></div>
        </div>
      </aside>
    </div>
  </div>

  <div id="overlay" class="overlay" style="display:none"></div>

  <script>
    const BASE = 'https://studying-tt.onrender.com';
    const socket = io(BASE, { transports: ['websocket','polling'] });

    /* 識別ID生成ロジック（暗号化） */
    function generateTripcode(seed) {
      if (!seed) return "未設定";
      // 簡易的なハッシュ化ロジック
      let hash = 0;
      const salted = seed + "secure_salt_2024_id"; // 固定ソルト
      for (let i = 0; i < salted.length; i++) {
        hash = ((hash << 5) - hash) + salted.charCodeAt(i);
        hash |= 0;
      }
      // 8文字の英数字に変換
      return "ID:" + Math.abs(hash).toString(36).toUpperCase().padStart(8, '0');
    }

    /* UI Elements */
    const chatColumn = document.getElementById('chatColumn');
    const sendBtn = document.getElementById('sendBtn');
    const usernameInput = document.getElementById('username');
    const messageInput = document.getElementById('messageInput');
    const seedInput = document.getElementById('seed');
    const clearBtn = document.getElementById('clearBtn');
    const toggleOthelloBtn = document.getElementById('toggleOthello');
    const adminLoginBtn = document.getElementById('adminLoginBtn');
    const adminModalBtn = document.getElementById('adminModalBtn');
    const othelloPanel = document.getElementById('othelloPanel');
    const boardEl = document.getElementById('board');
    const overlay = document.getElementById('overlay');

    let messages = [];
    let currentRoom = null;
    let gameState = null;
    let myColor = null;

    function avatarText(name){ return (name || '匿名').trim().slice(0,2).toUpperCase(); }
    function formatTime(ts){ return new Date(ts).toLocaleString(); }

    /* メッセージの描画 */
    function appendMessageElement(m){
      const item = document.createElement('article');
      item.className = 'message';
      item.setAttribute('data-id', m.id);

      // なりすまし防止用ポップアップ関数
      const showIdentity = () => {
        const idStr = generateTripcode(m.seed);
        alert(`【ユーザー確認情報】\n名前: ${m.username || '匿名'}\n識別ID: ${idStr}\n\n※識別IDが以前と同じであれば、本人である可能性が高いです。`);
      };

      const av = document.createElement('div'); 
      av.className = 'avatar'; 
      av.textContent = avatarText(m.username);
      av.onclick = showIdentity; // アイコンタップ

      const body = document.createElement('div'); body.className = 'body';
      const meta = document.createElement('div'); meta.className = 'meta';
      const name = document.createElement('div'); 
      name.className = 'name'; 
      name.textContent = m.username || '匿名';
      name.onclick = showIdentity; // 名前のタップ

      if(m.isAdmin){
        const badge = document.createElement('span'); badge.className = 'admin-badge'; badge.textContent = '管理者';
        name.appendChild(badge);
      }
      
      const time = document.createElement('div'); time.className = 'time'; time.textContent = formatTime(m.time);
      meta.appendChild(name); meta.appendChild(time);

      const text = document.createElement('div'); text.className = 'text'; text.textContent = m.message;
      const reactions = document.createElement('div'); reactions.className = 'reactions';

      body.appendChild(meta); body.appendChild(text); body.appendChild(reactions);
      item.appendChild(av); item.appendChild(body);
      if(m.username === 'システム') item.classList.add('system-note');

      chatColumn.prepend(item); // 最新を上へ
    }

    async function loadMessages(){
      try{
        const res = await fetch(BASE + '/api/messages');
        messages = await res.json();
        chatColumn.innerHTML = '';
        for(let m of messages) appendMessageElement(m);
      }catch(e){}
    }

    async function postMessage(){
      const username = usernameInput.value.trim() || '匿名';
      const message = messageInput.value.trim();
      const seed = seedInput.value.trim();
      if(!message) return;
      const payload = { username, message, time: new Date().toISOString(), seed };
      await fetch(BASE + '/api/messages', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
      messageInput.value = '';
    }

    adminLoginBtn.onclick = async () => {
      const pwd = prompt('管理者パスワード');
      if(!pwd) return;
      const res = await fetch(BASE + '/api/admin-login', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ username: usernameInput.value, password: pwd }) });
      const data = await res.json();
      if(res.ok){
        seedInput.value = pwd;
        adminModalBtn.style.display = 'inline-block';
        loadMessages();
      }
    };

    socket.on('newMessage', (msg) => { messages.push(msg); appendMessageElement(msg); });

    /* Othello Logic */
    function buildBoard(){
      boardEl.innerHTML = '';
      for(let r=0;r<8;r++) for(let c=0;c<8;c++){
        const cell = document.createElement('div'); cell.className = 'cell';
        cell.onclick = () => {
          if(gameState && gameState.turn === myColor) socket.emit('makeMove', { roomId: currentRoom, r, c, color: myColor });
        };
        boardEl.appendChild(cell);
      }
    }

    function renderBoard(g){
      const cells = boardEl.children;
      for(let r=0;r<8;r++) for(let c=0;c<8;c++){
        const idx = r*8+c; cells[idx].innerHTML = '';
        if(g.board[r][c]===1) cells[idx].innerHTML = '<div class="disc black"></div>';
        if(g.board[r][c]===2) cells[idx].innerHTML = '<div class="disc white"></div>';
      }
    }

    socket.on('gameState', (g) => {
      gameState = g;
      renderBoard(g);
      document.getElementById('statusLabel').textContent = '状態: ' + g.status;
      document.getElementById('countsLabel').textContent = `黒: ${g.counts.black} / 白: ${g.counts.white}`;
      const me = usernameInput.value.trim();
      if(g.players[1]===me) myColor=1; else if(g.players[2]===me) myColor=2; else myColor=null;
      document.getElementById('gameArea').style.display = 'block';
    });

    toggleOthelloBtn.onclick = () => {
      othelloPanel.style.display = (othelloPanel.style.display==='none') ? 'block' : 'none';
      document.getElementById('splitContainer').classList.toggle('split');
    };

    sendBtn.onclick = postMessage;
    messageInput.onkeydown = (e) => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); postMessage(); } };
    
    buildBoard();
    loadMessages();
  </script>
</body>
</html>
